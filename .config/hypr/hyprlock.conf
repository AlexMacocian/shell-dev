# Auto-generated by ThemeEngine — do not edit manually
# Theme: Elden Ring

background {
    path = ~/.config/hypr/wallpapers/elden-ring/er-01.png
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
}

input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(C8A84E)
    inner_color = rgb(1A1610)
    font_color = rgb(E8D5B5)
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    check_color = rgb(5A7247)
    fail_color = rgb(8B2500)
    fail_text = <i>$FAIL</i>
    capslock_color = rgb(B5722A)
    position = 0, -80
    halign = center
    valign = center
    font_family = JetBrainsMono Nerd Font
}

label {
    text = $TIME
    color = rgb(D4AF37)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    text = $USER
    color = rgb(A89070)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}